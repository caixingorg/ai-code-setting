name: Bug report
description: 报告可复现的问题
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供最小复现信息，并移除敏感数据。
  - type: input
    id: summary
    attributes:
      label: 问题概述
      placeholder: 简要描述遇到的问题
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 执行命令
        2. 使用配置
        3. 观察结果
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js 版本
      placeholder: 例如 20.18.0
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: 例如 macOS 15 / Ubuntu 24.04 / Windows 11
  - type: textarea
    id: extra
    attributes:
      label: 其他上下文
      description: 请勿粘贴密钥、令牌、密码等敏感信息
