name: Feature request
description: 提出功能增强建议
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: 功能概述
      placeholder: 简要描述希望增加什么能力
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      placeholder: 这个功能要解决什么具体痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      placeholder: 你期望的命令、配置或输出是什么？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      placeholder: 是否考虑过其他方式？
  - type: textarea
    id: extra
    attributes:
      label: 其他说明
